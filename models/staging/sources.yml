version: 2

sources:
  # De HUDS bron: handmatige exports uit Betty Blocks, geladen via Google Drive.
  # Tabelnames worden automatisch afgeleid van de bestandsnaam in Drive:
  #   '{Bestandsnaam}' → raw_huds_{bestandsnaam_lowercase}
  # Nieuwe bestanden in de Drive-map worden automatisch opgepikt door de flow.
  - name: huds
    database: ivy-warehouse
    schema: raw_huds
    description: >
      Exports uit HUDS (Betty Blocks), automatisch geladen vanuit een
      Google Drive-map via de Prefect HUDS-ingestie-flow.

    tables:
      - name: raw_huds_uurtarieven
        description: Tarieven per project per rol

      - name: raw_huds_facturen
        description: Facturen uit HUDS

      - name: raw_huds_facturatie_overzicht
        description: Maandelijks facturatie-overzicht per project met uren per rol

      - name: raw_huds_uren
        description: Uren uit HUDS

      - name: raw_huds_uren_omzet_planning
        description: Geplande uren en omzet per project per maand per rol

      - name: raw_huds_uren_omzet_realisatie
        description: Gerealiseerde uren en omzet per project per maand per rol

      - name: raw_huds_bedrijven
        description: Klantgegevens uit HUDS

      - name: raw_huds_projecten
        description: Projecten uit HUDS

      - name: raw_huds_project_voortgang_datawarehouse
        description: Project voortgang overzicht voor het datawarehouse

      - name: raw_huds_werknemers
        description: Werknemersgegevens uit HUDS

      - name: raw_huds_werknemers_intern
        description: Interne werknemersgegevens uit HUDS


  # De bron voor HubSpot CRM data.
  - name: hubspot
    database: ivy-warehouse
    schema: raw_hubspot
    description: >
      Data die direct uit de HubSpot API komt
    tables:
      - name: raw_hubspot_contacts
        description: Alle personen die in HubSpot staan.
      - name: raw_hubspot_companies
        description: Alle bedrijven die in HubSpot staan.
