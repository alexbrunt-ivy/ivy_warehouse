name: dbt CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  dbt:
    runs-on: ubuntu-latest

    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}/.github/dbt
      PYTHONPATH: ${{ github.workspace }}
      HUDS_SKIP_DRIVE: "true"
      HUDS_API_TOKEN: ${{ secrets.HUDS_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --no-dev

      - name: Authenticate to Google Cloud
        env:
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
        run: |
          echo "$GCP_SERVICE_ACCOUNT" > $RUNNER_TEMP/gcp-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/gcp-key.json" >> $GITHUB_ENV

      - name: Ingest HUDS data
        run: uv run python flows/huds_flow.py

      - name: Install packages
        run: uv run dbt deps

      - name: Check connection
        run: uv run dbt debug

      - name: Parse project
        run: uv run dbt parse

      - name: Build project
        run: uv run dbt build
